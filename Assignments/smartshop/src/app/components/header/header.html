<header class="max-w-full bg-black text-white flex items-center justify-between  p-2 m-1 rounded-full">
    <p class="bg-white  text-black rounded-full p-2 border-2 hover:border-white hover:text-white hover:bg-black cursor-pointer transition duration-300 text-xl font-mono">Hello, {{username()}}!</p>
    <div class="flex items-center gap-4">
        <a [routerLink]="['/dashboard']" class="cursor-pointer border-b-2 border-transparent hover:border-white transition duration-300">Go to Dashboard</a>
        <button (click)="onLogout()" class ="bg-red-600 hover:bg-red-400 px-3 py-2 rounded-full cursor-pointer">Logout</button>
    </div>

</header>
