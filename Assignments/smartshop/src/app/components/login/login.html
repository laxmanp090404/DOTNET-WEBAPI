<section class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
      Login
    </h1>

    <form (ngSubmit)="handleLoginClick()" class="space-y-6">

      <div>
        <label
          for="username"
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Username
        </label>

        <input
          type="text"
          id="username"
          [formField]="loginForm.username"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-blue-500
                 focus:border-blue-500 transition duration-200"
        />

       @if(loginForm.username().dirty()){
         @for (error of loginForm.username().errors(); track error.message) {
          <div
            class="mt-2 rounded-md bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-600"
          >
            {{ error.message }}
          </div>
        }
       }
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Password
        </label>

        <input
          type="password"
          id="password"
          [formField]="loginForm.password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-blue-500
                 focus:border-blue-500 transition duration-200"
        />

      @if(loginForm.password().dirty()){
          @for (error of loginForm.password().errors(); track error.message) {
          <div
            class="mt-2 rounded-md bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-600"
          >
            {{ error.message }}
          </div>
        }
      }
      </div>

      <button
        type="submit"
        [disabled]="progress() || loginForm().invalid()"
        class="w-full flex items-center justify-center gap-3
               bg-blue-600 hover:bg-blue-700
               disabled:bg-gray-400 disabled:cursor-not-allowed
               text-white font-semibold py-3 px-4 rounded-lg
               transition duration-200"
      >
        <span>Login</span>

        @if (progress()) {
          <svg
            class="animate-spin h-5 w-5 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
            ></path>
          </svg>
        }
      </button>

    </form>
  </div>
</section>
