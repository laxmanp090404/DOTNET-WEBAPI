<div class="w-screen h-screen flex flex-col items-center justify-center gap-4 p-5">
    @if(product()){
        <div class="product-details max-w-2xl flex items-center justify-center gap-6 shadow-2xl rounded-lg p-5   ">
            <img
                [src]="product()?.thumbnail"
                [alt]="product()?.title"
                class="h-auto">
             <div class="details flex flex-col items-start gap-1 rounded-lg">
                <h3 class="text-2xl font-semibold">{{ product()?.title }}</h3>
                <h3 class="text-gray-600">{{ product()?.category }}</h3>
                <p class="text-lg font-bold">${{product()?.price}} USD</p>
                <p class="text-sm text-gray-500">Rating: {{product()?.rating}}</p>
                <p class="text-md mt-2">{{product()?.description}}</p>
            </div>
        </div>
    }
</div>
