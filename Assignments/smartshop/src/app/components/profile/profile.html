@if(userData()){
<h1 class="text-5xl font-extrabold text-center font-mono my-8">
  Profile Page
</h1>

<div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg p-6 flex flex-col md:flex-row items-center gap-8">

  <div class="left">
    <img
      [src]="userData()?.imageUrl"
      [alt]="userData()?.username"
      class="w-40 h-40 rounded-full object-cover border-4 border-gray-200"
    >
  </div>

  <div class="right space-y-2">
    <h2 class="text-2xl font-bold text-gray-800">
      Welcome, {{ userData()?.username }}!
    </h2>

    <p><span class="font-semibold">Email:</span> {{ userData()?.email }}</p>
    <p><span class="font-semibold">First Name:</span> {{ userData()?.firstName }}</p>
    <p><span class="font-semibold">Last Name:</span> {{ userData()?.lastName }}</p>
    <p><span class="font-semibold">Gender:</span> {{ userData()?.gender }}</p>
  </div>

</div>
}
@else{
<p class="text-center text-gray-500 mt-10">
  Loading profile...
</p>
}
